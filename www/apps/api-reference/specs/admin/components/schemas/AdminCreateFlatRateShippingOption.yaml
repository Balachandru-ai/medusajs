type: object
description: SUMMARY
x-schemaName: AdminCreateFlatRateShippingOption
required:
  - price_type
  - prices
  - name
  - service_zone_id
  - shipping_profile_id
  - provider_id
properties:
  price_type:
    type: string
    title: price_type
    description: The shipping option's price type.
  prices:
    type: array
    description: The shipping option's prices.
    items:
      oneOf:
        - type: object
          description: The price's prices.
          x-schemaName: AdminCreateShippingOptionPriceWithCurrency
          required:
            - currency_code
            - amount
          properties:
            currency_code:
              type: string
              title: currency_code
              description: The price's currency code.
            amount:
              type: number
              title: amount
              description: The price's amount.
            rules:
              type: array
              description: The price's rules.
              items:
                type: object
                description: The rule's rules.
                x-schemaName: PriceRule
                required:
                  - attribute
                  - operator
                  - value
                properties:
                  attribute:
                    type: string
                    title: attribute
                    description: The rule's attribute.
                  operator:
                    type: string
                    description: The rule's operator.
                    enum:
                      - gt
                      - lt
                      - eq
                      - lte
                      - gte
                  value:
                    type: number
                    title: value
                    description: The rule's value.
        - type: object
          description: The price's prices.
          x-schemaName: AdminCreateShippingOptionPriceWithRegion
          required:
            - region_id
            - amount
          properties:
            region_id:
              type: string
              title: region_id
              description: The price's region id.
            amount:
              type: number
              title: amount
              description: The price's amount.
            rules:
              type: array
              description: The price's rules.
              items:
                type: object
                description: The rule's rules.
                x-schemaName: PriceRule
                required:
                  - attribute
                  - operator
                  - value
                properties:
                  attribute:
                    type: string
                    title: attribute
                    description: The rule's attribute.
                  operator:
                    type: string
                    description: The rule's operator.
                    enum:
                      - gt
                      - lt
                      - eq
                      - lte
                      - gte
                  value:
                    type: number
                    title: value
                    description: The rule's value.
  name:
    type: string
    title: name
    description: The shipping option's name.
  service_zone_id:
    type: string
    title: service_zone_id
    description: The shipping option's service zone id.
  shipping_profile_id:
    type: string
    title: shipping_profile_id
    description: The shipping option's shipping profile id.
  data:
    type: object
    description: The shipping option's data.
  provider_id:
    type: string
    title: provider_id
    description: The shipping option's provider id.
  type:
    $ref: ./AdminCreateShippingOptionType.yaml
  type_id:
    type: string
    title: type_id
    description: The shipping option's type id.
  rules:
    type: array
    description: The shipping option's rules.
    items:
      $ref: ./AdminCreateShippingOptionRule.yaml
  metadata:
    type: object
    description: The shipping option's metadata.
