post:
  operationId: PostFulfillmentsIdCancel
  summary: Cancel a Fulfillment
  description: >
    Cancel a fulfillment. The fulfillment can't be shipped or delivered.


    To cancel the fulfillment, the `cancelFulfillment` method of the associated
    fulfillment provider is used.
  x-authenticated: true
  parameters:
    - name: id
      in: path
      description: The fulfillment's ID.
      required: true
      schema:
        type: string
  security:
    - api_token: []
    - cookie_auth: []
    - jwt_token: []
  x-codeSamples:
    - lang: JavaScript
      label: JS SDK
      source:
        $ref: ../code_samples/JavaScript/admin_fulfillments_{id}_cancel/post.js
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/admin_fulfillments_{id}_cancel/post.sh
  tags:
    - Fulfillments
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AdminFulfillmentResponse.yaml
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  x-workflow: cancelFulfillmentWorkflow
  x-events: []
