post:
  operationId: PostPriceListsIdProducts
  summary: Remove Products from Price List
  description: Remove products from a price list.
  x-authenticated: true
  parameters:
    - name: id
      in: path
      description: The price list's ID.
      required: true
      schema:
        type: string
  security:
    - api_token: []
    - cookie_auth: []
    - jwt_token: []
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AdminLinkPriceListProducts.yaml
  x-codeSamples:
    - lang: JavaScript
      label: JS SDK
      source:
        $ref: ../code_samples/JavaScript/admin_price-lists_{id}_products/post.js
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/admin_price-lists_{id}_products/post.sh
  tags:
    - Price Lists
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AdminPriceListResponse.yaml
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  x-workflow: batchPriceListPricesWorkflow
  x-events: []
