post:
  operationId: PostProductsIdVariantsVariant_idInventoryItems
  summary: Associate Variant with Inventory Item
  x-sidebar-summary: Associate Variant's Inventory
  description: >-
    Associate with a product variant an inventory item that manages its
    inventory details.
  x-authenticated: true
  parameters:
    - name: id
      in: path
      description: The product's ID.
      required: true
      schema:
        type: string
    - name: variant_id
      in: path
      description: The variant's ID.
      required: true
      schema:
        type: string
  security:
