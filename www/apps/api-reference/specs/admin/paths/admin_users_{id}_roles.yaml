get:
  operationId: GetUsersIdRoles
  summary: List Roles
  description: >-
    Retrieve a list of roles in a user. The roles can be filtered by fields like
    FILTER FIELDS. The roles can also be paginated.
  x-authenticated: true
  parameters:
    - name: id
      in: path
      description: The user's ID.
      required: true
      schema:
        type: string
  security:
    - cookie_auth: []
    - jwt_token: []
  x-codeSamples:
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/admin_users_{id}_roles/get.sh
  tags:
    - Users
  responses:
    '200':
      description: OK
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
post:
  operationId: PostUsersIdRoles
  summary: Add Role to User
  description: Add a Role to a user
  x-authenticated: true
  parameters:
    - name: id
      in: path
      description: The user's ID.
      required: true
      schema:
        type: string
  security:
    - cookie_auth: []
    - jwt_token: []
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AdminAssignUserRoles.yaml
  x-codeSamples:
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/admin_users_{id}_roles/post.sh
  tags:
    - Users
  responses:
    '200':
      description: OK
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  x-workflow: assignUserRolesWorkflow
  x-events: []
