post:
  operationId: PostCarts
  summary: Create Cart
  description: Create a cart.
  x-authenticated: false
  parameters:
    - name: x-publishable-api-key
      in: header
      description: Publishable API Key created in the Medusa Admin.
      required: true
      schema:
        type: string
        externalDocs:
          url: https://docs.medusajs.com/api/store#publishable-api-key
  requestBody:
    content:
      application/json:
        schema:
          allOf:
            - $ref: ../components/schemas/StoreCreateCart.yaml
            - type: object
              description: The cart's details.
              properties:
                additional_data:
                  type: object
                  description: >-
                    Pass additional custom data to the API route. This data is
                    passed to the underlying workflow under the
                    `additional_data` parameter.
          description: The cart's details.
  x-codeSamples:
    - lang: JavaScript
      label: JS SDK
      source:
        $ref: ../code_samples/JavaScript/store_carts/post.js
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/store_carts/post.sh
  tags:
    - Carts
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/StoreCartResponse.yaml
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
  x-workflow: createCartWorkflow
  x-events:
    - name: cart.created
      payload: |-
        ```ts
        {
          id, // The ID of the cart
        }
        ```
      description: Emitted when a cart is created.
      deprecated: false
