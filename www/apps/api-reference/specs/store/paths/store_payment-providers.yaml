get:
  operationId: GetPaymentProviders
  summary: List Payment Providers
  description: >-
    Retrieve a list of payment providers. You must provide the `region_id` query
    parameter to retrieve the payment providers enabled in that region.
  x-authenticated: false
  externalDocs:
    url: >-
      https://docs.medusajs.com/v2/resources/storefront-development/checkout/payment
    description: 'Storefront guide: How to implement payment during checkout.'
  parameters:
    - name: x-publishable-api-key
      in: header
      description: Publishable API Key created in the Medusa Admin.
      required: true
      schema:
        type: string
        externalDocs:
          url: https://docs.medusajs.com/api/store#publishable-api-key
    - name: region_id
      in: query
      description: >-
        Filter by a region ID to get the payment providers enabled in that
        region.
      required: true
      schema:
        type: string
        title: region_id
        description: Filter by a region ID.
  x-codeSamples:
    - lang: JavaScript
      label: JS SDK
      source:
        $ref: ../code_samples/JavaScript/store_payment-providers/get.js
    - lang: Shell
      label: cURL
      source:
        $ref: ../code_samples/Shell/store_payment-providers/get.sh
  tags:
    - Payment Providers
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - type: object
                description: The list of payment providers.
                required:
                  - limit
                  - offset
                  - count
                properties:
                  limit:
                    type: number
                    title: limit
                    description: The maximum number of items returned.
                  offset:
                    type: number
                    title: offset
                    description: >-
                      The number of items skipped before retrieving the returned
                      items.
                  count:
                    type: number
                    title: count
                    description: The total number of items.
              - type: object
                description: The list of payment providers.
                required:
                  - payment_providers
                properties:
                  payment_providers:
                    type: array
                    description: The list of payment providers.
                    items:
                      $ref: ../components/schemas/StorePaymentProvider.yaml
    '400':
      $ref: ../components/responses/400_error.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      $ref: ../components/responses/not_found_error.yaml
    '409':
      $ref: ../components/responses/invalid_state_error.yaml
    '422':
      $ref: ../components/responses/invalid_request_error.yaml
    '500':
      $ref: ../components/responses/500_error.yaml
